project:
  type: website
  execute-dir: file
  render:
    - "*.qmd"
    
website:
  title: "Intro to Reproducible Data Analysis Using R"
  navbar:
    search: false
    right:
      - icon: home
        text: "Home"
        file: index.qmd
      - icon: book-half
        text: "Lectures"
        href: lectures.qmd
      - icon: box-seam-fill
        text: "Materials"
        menu:
          - text: "Pre-reading"
            href: readings.qmd
          - text: "In-Class Activities"
            href: activities.qmd
          - text: "Assignments"
            href: projects.qmd
      - icon: star
        text: "Resources"
        href: references.qmd
      - icon: github
        href: https://github.com/lindsaynhayes/introR2026
format:
  html:
    theme: simplex
    toc: true
    css: styles.css
    code-overflow: wrap

editor: source

execute:
  freeze: auto
